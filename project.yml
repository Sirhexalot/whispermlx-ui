name: WhisperMLXUI
options:
  bundleIdPrefix: local.whispermlx
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "F22N2AUDUL"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_ENTITLEMENTS: WhisperMLXUI/WhisperMLXUI.entitlements
    SPARKLE_FEED_URL: "https://sirhexalot.github.io/whispermlx-ui/appcast.xml"
    SPARKLE_PUBLIC_ED_KEY: "ATxSWQj7gj+tmqgt2bVnqv6sBncuVwFxyoBPUhEfyjk="
targets:
  WhisperMLXUI:
    type: application
    platform: macOS
    dependencies:
      - package: Sparkle
    sources:
      - path: Sources/WhisperMLXUI
        excludes:
          # The String Catalogs at the source root are the authoritative
          # translations. Keeping the legacy .strings files outside the target
          # prevents Xcode from compiling two Localizable/InfoPlist tables.
          - Resources
    info:
      path: WhisperMLXUI/Info.plist
      properties:
        CFBundleDisplayName: WhisperMLX UI
        CFBundleName: WhisperMLX UI
        CFBundleDevelopmentRegion: de
        CFBundleLocalizations:
          - de
          - en
        CFBundleIdentifier: local.whispermlx.ui
        CFBundleShortVersionString: "1.0.7"
        CFBundleVersion: "8"
        LSMinimumSystemVersion: "14.0"
        NSMicrophoneUsageDescription: WhisperMLX UI benötigt das Mikrofon, um lokale Aufnahmen zu transkribieren.
        NSAudioCaptureUsageDescription: WhisperMLX UI benötigt Systemaudio, um lokale Aufnahmen zu transkribieren.
        NSScreenCaptureUsageDescription: WhisperMLX UI benötigt Systemaudio, um lokale Aufnahmen zu transkribieren.
        SUFeedURL: "$(SPARKLE_FEED_URL)"
        SUPublicEDKey: "$(SPARKLE_PUBLIC_ED_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.whispermlx.ui
        PRODUCT_NAME: WhisperMLX UI
        GENERATE_INFOPLIST_FILE: NO
    postBuildScripts:
      - name: WhisperMLX-Befehl einbetten
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/bin/whispermlx
        script: |
          mkdir -p "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin"
          cp "${SRCROOT}/bin/whispermlx" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin/whispermlx"
          chmod 755 "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin/whispermlx"
          if [ ! -x "${SRCROOT}/bin/ffmpeg" ]; then
            echo "error: Die eingebettete FFmpeg-Version fehlt. Bitte scripts/build-bundled-ffmpeg.sh ausführen."
            exit 1
          fi
          cp "${SRCROOT}/bin/ffmpeg" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin/ffmpeg"
          chmod 755 "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin/ffmpeg"
          # iCloud/File Provider metadata would invalidate the app signature.
          xattr -cr "${TARGET_BUILD_DIR}/${WRAPPER_NAME}"
